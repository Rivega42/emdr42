# Observability extension для docker-compose (#138)
# Использование:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d

version: '3.8'

services:
  # Prometheus node_exporter — host-level metrics (CPU, memory, disk, network)
  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    pid: host
    volumes:
      - '/:/host:ro,rslave'
    command:
      - '--path.rootfs=/host'
    ports:
      - "9100:9100"

  # postgres_exporter — PostgreSQL metrics для Prometheus
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://emdr42:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/emdr42?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  # redis_exporter — Redis metrics
  redis-exporter:
    image: oliver006/redis_exporter:latest
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

  # cAdvisor — per-container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "8080:8080"
    privileged: true

  # Loki — log aggregation
  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yaml
    ports:
      - "3100:3100"

  # Promtail — log collector (Docker socket)
  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki

  # Alertmanager
  # envsubst pre-render: Alertmanager не делает interpolation env-переменных
  # в YAML. Без этого `${SMTP_PASS}` уходил в SMTP literal-строкой.
  alertmanager-config:
    image: alpine:3.20
    command:
      - sh
      - -c
      - "apk add --no-cache gettext && envsubst < /input/alertmanager.yml > /output/alertmanager.yml"
    volumes:
      - ./monitoring/alertmanager.yml:/input/alertmanager.yml:ro
      - alertmanager_config:/output
    environment:
      - SMTP_HOST
      - SMTP_PASS
      - PAGERDUTY_KEY
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_CHAT_ID
    restart: "no"

  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    depends_on:
      alertmanager-config:
        condition: service_completed_successfully
    ports:
      - "9093:9093"
    volumes:
      - alertmanager_config:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'

volumes:
  loki_data:
  alertmanager_data:
  alertmanager_config:
