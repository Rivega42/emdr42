# EMDR42 API Gateway — nginx reverse proxy
# Production: SSL termination за gateway. Для dev — HTTP-only, за HTTPS идёт отдельный
# termination на уровне LB (Cloudflare/ALB). См. #115.

upstream api_backend {
    server api:8000;
}

upstream ws_backend {
    server orchestrator:8002;
}

upstream frontend {
    server frontend:3000;
}

# Security headers — применяются везде через include
# (nginx не позволяет наследовать add_header, поэтому дублируем в каждом location)
map $sent_http_content_type $security_headers {
    default "";
}

# Rate limit zones (#118 — дополнительный уровень защиты перед app rate-limiter)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Block common scanners and known-bad UAs
map $http_user_agent $block_ua {
    default 0;
    ~*(nikto|sqlmap|nmap|masscan|havij|jorgee|censys)  1;
}

server {
    listen 80;
    server_name _;

    # Лимит размера тела запроса (защита от BOFH uploads)
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 10s;
    keepalive_timeout 65s;
    send_timeout 30s;

    limit_conn conn_limit 50;

    if ($block_ua) { return 403; }

    # Security headers (применяются ко всем ответам через add_header always)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), payment=()" always;
    # HSTS будет работать только через HTTPS termination выше
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Скрыть nginx версию
    server_tokens off;

    # --- API маршруты ---
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # tRPC маршруты
    location /trpc/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket (Session Orchestrator)
    location /socket.io/ {
        proxy_pass http://ws_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Фронтенд — всё остальное
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check gateway
    location = /gateway/health {
        access_log off;
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # Block доступ к hidden files / admin-ovr files
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }
}
