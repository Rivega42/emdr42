# Host nginx vhost для emdr42.ru — НОВАЯ версия (docker-стек).
# Референс для переключения трафика: заменяет /etc/nginx/sites-available/emdr42.ru
# ПОСЛЕ того, как docker-стек поднят и протестирован.
#
# Откат: вернуть прежний vhost (proxy_pass на 127.0.0.1:3700 — PM2) + nginx -s reload.
# Сертификаты certbot уже выпущены для emdr42.ru — пути не меняются.

server {
    listen 80;
    server_name emdr42.ru www.emdr42.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://emdr42.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name emdr42.ru www.emdr42.ru;

    ssl_certificate /etc/letsencrypt/live/emdr42.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emdr42.ru/privkey.pem;

    client_max_body_size 10m;

    # LiveKit ws signaling: wss://emdr42.ru/livekit/<path> -> 127.0.0.1:7880/<path>
    location /livekit/ {
        proxy_pass http://127.0.0.1:7880/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Всё остальное — docker gateway (он маршрутизирует /api, /socket.io, фронт)
    location / {
        proxy_pass http://127.0.0.1:8800;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
