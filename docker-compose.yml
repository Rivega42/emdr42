version: '3.8'

services:
  # API Gateway (nginx reverse proxy)
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - frontend
      - api
      - orchestrator

  # Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=http://localhost:8002
    depends_on:
      - api
      - orchestrator

  # Backend API (NestJS)
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://emdr42:emdr42_secret@postgres:5432/emdr42
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-jwt-secret-change-in-production
      - PHI_ENCRYPTION_KEY=${PHI_ENCRYPTION_KEY:-dev-only-change-in-production}
      - PORT=8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Session Orchestrator (WebSocket)
  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - API_URL=http://api:8000
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-in-production}
      - PORT=8002
      # Cloud providers (optional fallback)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      # Local providers (primary)
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - WHISPER_BASE_URL=http://whisper:8000
      - PIPER_BASE_URL=http://piper:5000
      # LiveKit
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
    depends_on:
      - api
      - redis
      - ollama
      - whisper
      - livekit

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=emdr42
      - POSTGRES_PASSWORD=emdr42_secret
      - POSTGRES_DB=emdr42
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emdr42"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/var/lib/redis/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # LiveKit (WebRTC media server) - Self-hosted
  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"   # HTTP API
      - "7881:7881"   # WebRTC TCP
      - "7882:7882/udp" # WebRTC UDP
      - "50000-50100:50000-50100/udp" # RTP ports
    environment:
      - LIVEKIT_KEYS=${LIVEKIT_API_KEY:-devkey}:${LIVEKIT_API_SECRET:-secret}
    volumes:
      - ./livekit.yaml:/livekit.yaml
    command: --config /livekit.yaml

  # Ollama (Local LLM) - для AI диалогов
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Если нет GPU, закомментировать deploy секцию выше

  # Faster-Whisper (Local STT) - для голоса
  whisper:
    image: fedirz/faster-whisper-server:latest-cuda
    ports:
      - "8001:8000"
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-medium
      - WHISPER__DEVICE=cuda
      - WHISPER__COMPUTE_TYPE=float16
    volumes:
      - whisper_data:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Для CPU: использовать image: fedirz/faster-whisper-server:latest
    # и WHISPER__DEVICE=cpu, WHISPER__COMPUTE_TYPE=int8

  # Piper TTS (Local TTS) - для озвучки
  piper:
    image: rhasspy/piper:latest
    ports:
      - "5000:5000"
    volumes:
      - piper_data:/data
    command: --voice en_US-lessac-medium

  # Vosk STT (Realtime Speech-to-Text) - для голосового ввода
  vosk:
    image: alphacep/kaldi-vosk-server:latest
    ports:
      - "2700:2700"
    environment:
      - VOSK_MODEL_PATH=/opt/vosk-model-ru
    volumes:
      - vosk_model:/opt/vosk-model-ru
    # Модель скачается при первом запуске или вручную:
    # docker exec vosk wget -qO- https://alphacephei.com/vosk/models/vosk-model-small-ru-0.22.zip | unzip -d /opt/

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # MinIO (Object Storage for recordings)
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=emdr42
      - MINIO_ROOT_PASSWORD=emdr42_secret
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:
  ollama_data:
  whisper_data:
  piper_data:
  livekit_data:
  vosk_model:
