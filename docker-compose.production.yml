# EMDR42 — production compose для single-node сервера БЕЗ GPU.
#
# Отличия от docker-compose.yml (dev):
#   - НЕТ ollama/whisper/vosk/piper (GPU-сервисы; сервер: 1 CPU, 8 GB RAM).
#     AI-диалоги работают через cloud-провайдеров, если заданы *_API_KEY.
#   - НЕТ prometheus/grafana/minio (не подключены к приложению, экономим RAM;
#     observability — отдельный docker-compose.observability.yml).
#   - api/orchestrator/gateway тянутся готовыми из ghcr (собраны CI из main).
#     Frontend собирается локально: NEXT_PUBLIC_* вшиваются в build-артефакт.
#   - Все служебные порты привязаны к 127.0.0.1 — наружу торчит только
#     host-nginx (TLS) и RTC-порты LiveKit (7881/tcp, 50000-50100/udp).
#   - gateway использует nginx.production.conf: срезает /api-префикс
#     (NestJS-роуты живут в корне) и проксирует с учётом X-Forwarded-Proto.
#
# Запуск:
#   cp .env.production.example .env   # заполнить секреты!
#   docker compose -f docker-compose.production.yml --project-name emdr42-prod pull
#   docker compose -f docker-compose.production.yml --project-name emdr42-prod build frontend
#   docker compose -f docker-compose.production.yml --project-name emdr42-prod run --rm migrate
#   docker compose -f docker-compose.production.yml --project-name emdr42-prod up -d
#
# Схема трафика:
#   host nginx (TLS, emdr42.ru) ──> 127.0.0.1:8800 gateway ──> frontend / api / orchestrator
#   host nginx /livekit/        ──> 127.0.0.1:7880 livekit (ws signaling)
#   браузер ──RTC──> :7881/tcp, :50000-50100/udp (LiveKit media, напрямую)

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  gateway:
    image: ghcr.io/rivega42/emdr42-gateway:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8800:80"
    volumes:
      - ./services/gateway/nginx.production.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_healthy
      orchestrator:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/gateway/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 128m
    <<: *default-logging

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set in .env, e.g. https://emdr42.ru/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:?set in .env, e.g. https://emdr42.ru}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?set in .env, e.g. https://emdr42.ru}
    image: emdr42-frontend:production
    restart: unless-stopped
    ports:
      - "127.0.0.1:3801:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 768m
    <<: *default-logging

  api:
    image: ghcr.io/rivega42/emdr42-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8801:8000"
    environment:
      - DATABASE_URL=postgresql://emdr42:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/emdr42
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in .env (min 32 chars)}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - PHI_ENCRYPTION_KEY=${PHI_ENCRYPTION_KEY:?set PHI_ENCRYPTION_KEY in .env}
      - NODE_ENV=production
      - PORT=8000
      - FRONTEND_URL=${NEXT_PUBLIC_APP_URL:?}
      - CORS_ORIGIN=${NEXT_PUBLIC_APP_URL:?}
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:?set LIVEKIT_API_KEY in .env}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:?set LIVEKIT_API_SECRET in .env}
      # Optional integrations — пустые значения отключают функциональность
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_FROM=${SMTP_FROM:-noreply@emdr42.ru}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:noreply@emdr42.ru}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8000/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 512m
    <<: *default-logging

  # Одноразовый прогон миграций: docker compose ... run --rm migrate
  # Вынесен из api-entrypoint (RUN_MIGRATIONS), чтобы рестарты api
  # не трогали схему БД без явного намерения.
  migrate:
    image: ghcr.io/rivega42/emdr42-api:${IMAGE_TAG:-latest}
    profiles: ["tools"]
    entrypoint: ["npx", "prisma", "migrate", "deploy"]
    environment:
      - DATABASE_URL=postgresql://emdr42:${POSTGRES_PASSWORD:?}@postgres:5432/emdr42
    depends_on:
      postgres:
        condition: service_healthy
    <<: *default-logging

  orchestrator:
    image: ghcr.io/rivega42/emdr42-orchestrator:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8802:8002"
    environment:
      - API_URL=http://api:8000
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:?}
      - NODE_ENV=production
      - PORT=8002
      # Cloud AI providers (локальных GPU-сервисов на этом сервере нет)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      # LiveKit
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:?}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:?}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 512m
    <<: *default-logging

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    # 5432-5435 на хосте заняты другими проектами
    ports:
      - "127.0.0.1:5436:5432"
    environment:
      - POSTGRES_USER=emdr42
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?}
      - POSTGRES_DB=emdr42
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emdr42 -d emdr42"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    <<: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Хост-порт не публикуем: redis нужен только внутри docker-сети
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 192mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    <<: *default-logging

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    ports:
      # ws signaling — только через host-nginx (wss://emdr42.ru/livekit/)
      - "127.0.0.1:7880:7880"
      # RTC media — напрямую из браузера
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    environment:
      # формат livekit: "key: secret" (пробел после двоеточия обязателен)
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY:?}: ${LIVEKIT_API_SECRET:?}"
    volumes:
      - ./livekit.production.yaml:/livekit.yaml:ro
    command: --config /livekit.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7880/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 512m
    <<: *default-logging

volumes:
  postgres_data:
  redis_data:
