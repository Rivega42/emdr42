name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: emdr42
          POSTGRES_PASSWORD: test
          POSTGRES_DB: emdr42_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prisma generate + migrate (api)
        working-directory: services/api
        env:
          DATABASE_URL: postgresql://emdr42:test@localhost:5432/emdr42_test
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Build packages
        run: pnpm run build --filter=@emdr42/core

      - name: Run Playwright tests
        env:
          DATABASE_URL: postgresql://emdr42:test@localhost:5432/emdr42_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: e2e-test-jwt-secret-at-least-32-characters-long
          PHI_ENCRYPTION_KEY: e2e-test-phi-key-at-least-32-characters-long
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: http://localhost:8002
          CI: 'true'
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
