name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 03:00 UTC

permissions:
  contents: read
  security-events: write  # для SARIF upload
  pull-requests: write

jobs:
  # ---------- Trivy filesystem scan ----------
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy in fs mode
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          exit-code: '0'  # не блокируем, только репортим

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-fs'

  # ---------- Trivy Docker image scans ----------
  trivy-images:
    name: Trivy Docker images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, orchestrator, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            docker build -t emdr42-${{ matrix.service }}:ci .
          else
            docker build -t emdr42-${{ matrix.service }}:ci \
              -f services/${{ matrix.service }}/Dockerfile services/${{ matrix.service }}
          fi

      - name: Scan image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'emdr42-${{ matrix.service }}:ci'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          exit-code: '1'  # fail на CRITICAL/HIGH

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'

  # ---------- npm audit ----------
  npm-audit:
    name: npm audit (critical/high)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Audit (production)
        run: pnpm audit --prod --audit-level=high

      # Для api/orchestrator packages отдельно (если npm)
      - name: Audit api
        working-directory: services/api
        run: npm audit --audit-level=high --production || true

      - name: Audit orchestrator
        working-directory: services/orchestrator
        run: npm audit --audit-level=high --production || true

  # ---------- Secrets scanning ----------
  gitleaks:
    name: Secrets scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # optional pro

  # ---------- SBOM generation ----------
  sbom:
    name: Generate SBOM (SPDX)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM — repository
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom-repo.spdx.json
          artifact-name: sbom-repo

      - name: Build + SBOM for api image
        run: |
          docker build -t emdr42-api:sbom -f services/api/Dockerfile services/api
      - name: SBOM for api
        uses: anchore/sbom-action@v0
        with:
          image: emdr42-api:sbom
          format: spdx-json
          output-file: sbom-api.spdx.json
          artifact-name: sbom-api

      - name: Attach SBOMs to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom-repo.spdx.json
            sbom-api.spdx.json

  # ---------- License compliance ----------
  license-check:
    name: License compliance (REUSE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run license-checker
        run: |
          npx license-checker --production --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;Unlicense;Python-2.0" --summary || \
          echo "::warning::Some dependencies use non-approved licenses. Review output."
