name: Deploy to staging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl + kustomize
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'
      - run: |
          curl -sL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz | tar xz
          sudo mv kustomize /usr/local/bin/

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.STAGING_KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "::warning::STAGING_KUBECONFIG not set — skipping deploy"
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set image tag (sha-short)
        if: env.KUBECONFIG_SET == 'true'
        env:
          KUBECONFIG_SET: ${{ secrets.STAGING_KUBECONFIG != '' }}
        working-directory: k8s/overlays/staging
        run: |
          SHA=sha-${GITHUB_SHA::7}
          kustomize edit set image \
            ghcr.io/rivega42/emdr42-api=ghcr.io/rivega42/emdr42-api:$SHA \
            ghcr.io/rivega42/emdr42-orchestrator=ghcr.io/rivega42/emdr42-orchestrator:$SHA \
            ghcr.io/rivega42/emdr42-frontend=ghcr.io/rivega42/emdr42-frontend:$SHA

      - name: Apply migrations Job
        if: secrets.STAGING_KUBECONFIG != ''
        run: |
          kubectl -n emdr42-staging delete job api-migrate --ignore-not-found
          kustomize build k8s/overlays/staging | kubectl apply -f - --selector=app=api-migrate
          kubectl -n emdr42-staging wait --for=condition=complete --timeout=10m job/api-migrate

      - name: Apply all manifests
        if: secrets.STAGING_KUBECONFIG != ''
        run: kustomize build k8s/overlays/staging | kubectl apply -f -

      - name: Wait for rollout
        if: secrets.STAGING_KUBECONFIG != ''
        run: |
          kubectl -n emdr42-staging rollout status deploy/api --timeout=10m
          kubectl -n emdr42-staging rollout status deploy/orchestrator --timeout=10m
          kubectl -n emdr42-staging rollout status deploy/frontend --timeout=10m

      - name: Smoke test
        run: |
          if [ -n "${{ vars.STAGING_URL }}" ]; then
            for i in 1 2 3 4 5; do
              if curl -fsS "${{ vars.STAGING_URL }}/healthz"; then exit 0; fi
              sleep 10
            done
            echo "::warning::Smoke test failed"
          fi
