name: 🐛 Баг
description: Сообщить о проблеме
title: "[BUG] "
labels: ["тип: баг", "статус: бэклог"]
body:
  - type: dropdown
    id: epic
    attributes:
      label: Эпик (родитель)
      description: К какому эпику относится. Если ни к какому — выберите "не относится".
      options:
        - EPIC-1
        - EPIC-2
        - EPIC-3
        - не относится
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Приоритет
      options:
        - "P0"
        - "P1"
        - "P2"
        - "P3"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Компонент
      options:
        - web
        - mobile
        - api
        - db
        - devops
        - ai
        - integrations
        - другое
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Описание бага
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      placeholder: |
        1. Открыть ...
        2. Нажать ...
        3. Увидеть ошибку
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Окружение
      placeholder: ОС, версия, браузер, версия приложения
  - type: textarea
    id: logs
    attributes:
      label: Логи / скриншоты
      render: shell
