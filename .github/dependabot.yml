version: 2
updates:
  # Root (Next.js frontend + shared tooling)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 10
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      three:
        patterns:
          - "three"
          - "@react-three/*"
          - "@types/three"
      trpc:
        patterns:
          - "@trpc/*"
      dev-dependencies:
        patterns:
          - "*"
        dependency-type: "development"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "frontend"

  # API service
  - package-ecosystem: "npm"
    directory: "/services/api"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
    labels:
      - "dependencies"
      - "backend"

  # Orchestrator service
  - package-ecosystem: "npm"
    directory: "/services/orchestrator"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "backend"

  # Shared packages
  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule: { interval: "weekly" }
    labels: ["dependencies", "package"]

  - package-ecosystem: "npm"
    directory: "/packages/emdr-engine"
    schedule: { interval: "weekly" }
    labels: ["dependencies", "package"]

  - package-ecosystem: "npm"
    directory: "/packages/ai-providers"
    schedule: { interval: "weekly" }
    labels: ["dependencies", "package"]

  - package-ecosystem: "npm"
    directory: "/packages/events"
    schedule: { interval: "weekly" }
    labels: ["dependencies", "package"]

  - package-ecosystem: "npm"
    directory: "/packages/livekit-integration"
    schedule: { interval: "weekly" }
    labels: ["dependencies", "package"]

  # Docker images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/services/api"
    schedule: { interval: "weekly" }
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/services/orchestrator"
    schedule: { interval: "weekly" }
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/services/gateway"
    schedule: { interval: "weekly" }
    labels: ["dependencies", "docker"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
