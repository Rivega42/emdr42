<!-- @dsCard group="Brand" viewport="700x340" name="Сцена «Лунная ночь»" subtitle="рецепт hero-фона: градиенты и мягкие формы, не фотореализм" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 0; }
  .scene {
    position: relative;
    height: 340px;
    overflow: hidden;
    background:
      radial-gradient(420px 220px at 62% 26%, rgba(184, 230, 211, 0.16), transparent 70%),
      linear-gradient(to bottom, #0b1d26 0%, #0a161d 62%, #071016 100%);
  }
  .moon {
    position: absolute; top: 17%; left: 62%; transform: translate(-50%, -50%);
    width: 56px; height: 56px; border-radius: 50%;
    background: radial-gradient(circle at 42% 38%, #d9f2e6, #9fd8c0 75%);
    box-shadow: 0 0 40px 12px rgba(159, 216, 192, 0.35);
  }
  .path {
    position: absolute; top: 24%; bottom: 0; left: 62%; transform: translateX(-50%);
    width: 3px;
    background: var(--moonpath-gradient);
    filter: blur(0.4px);
  }
  .shore {
    position: absolute; left: 0; right: 0; bottom: 0; height: 24%;
    background: linear-gradient(to top, rgba(7, 16, 22, 0.95), transparent);
  }
  .shore::after {
    content: ""; position: absolute; inset: auto 0 0 0; height: 60%;
    background: radial-gradient(60% 100% at 20% 100%, rgba(138, 111, 82, 0.18), transparent 70%);
  }
  .note { position: absolute; left: 20px; bottom: 16px; font-size: 11px; color: var(--text-muted); font-family: ui-monospace, monospace; max-width: 330px; }
</style>
</head>
<body>
  <div class="scene">
    <span class="moon"></span>
    <span class="path e-moonpath--shimmer"></span>
    <span class="shore"></span>
    <span class="note">небо --bg-scene → --bg → берег --bg-deep · луна и дорожка ведут к CTA · тёплая умбра в тени берега · мерцание отключается prefers-reduced-motion</span>
  </div>
</body>
</html>
