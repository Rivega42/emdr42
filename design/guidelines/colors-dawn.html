<!-- @dsCard group="Colors" viewport="700x170" name="Рассвет — фоны и поверхности" subtitle="светлая тема: тот же пейзаж в предрассветном тумане" -->
<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 16px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-md); border: 1px solid var(--border); padding: 10px 12px; height: 110px; display: flex; flex-direction: column; justify-content: flex-end; }
  .n { font-size: 12px; color: var(--text); font-weight: 500; }
  .v { font-size: 11px; color: var(--text-muted); font-family: ui-monospace, monospace; }
</style>
</head>
<body>
  <div class="sw" style="background: var(--bg-deep);"><span class="n">--bg-deep</span><span class="v">#E9F1ED · footer</span></div>
  <div class="sw" style="background: var(--bg);"><span class="n">--bg</span><span class="v">#F4F8F6 · фон страницы</span></div>
  <div class="sw" style="background: var(--bg-scene);"><span class="n">--bg-scene</span><span class="v">#EEF5F1 · небо hero</span></div>
  <div class="sw" style="background: var(--surface);"><span class="n">--surface</span><span class="v">#FFFFFF · карточка</span></div>
  <div class="sw" style="background: var(--surface-2);"><span class="n">--surface-2</span><span class="v">#E9F1ED · дымчатая</span></div>
</body>
</html>
