apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: emdr42-staging

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: orchestrator
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

images:
  - name: ghcr.io/rivega42/emdr42-api
    newTag: main
  - name: ghcr.io/rivega42/emdr42-orchestrator
    newTag: main
  - name: ghcr.io/rivega42/emdr42-frontend
    newTag: main
