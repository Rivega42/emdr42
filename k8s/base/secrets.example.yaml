# ВАЖНО: это ПРИМЕР. Реальный secret создавать через:
#   kubectl create secret generic emdr42-secrets -n emdr42 \
#     --from-literal=JWT_SECRET=$(openssl rand -base64 48) \
#     --from-literal=PHI_ENCRYPTION_KEY=$(openssl rand -base64 48) \
#     --from-literal=POSTGRES_PASSWORD=$(openssl rand -base64 24) \
#     --from-literal=...
#
# Или использовать sealed-secrets / External Secrets Operator / Vault для safe commit в git.

apiVersion: v1
kind: Secret
metadata:
  name: emdr42-secrets
  namespace: emdr42
type: Opaque
stringData:
  JWT_SECRET: "CHANGE_ME_via_kubectl_create_secret"
  PHI_ENCRYPTION_KEY: "CHANGE_ME"
  POSTGRES_PASSWORD: "CHANGE_ME"
  DATABASE_URL: "postgresql://emdr42:CHANGE_ME@postgres:5432/emdr42?connection_limit=20&pool_timeout=10"
  REDIS_URL: "redis://redis:6379"
  LIVEKIT_API_KEY: "CHANGE_ME"
  LIVEKIT_API_SECRET: "CHANGE_ME"
  # Optional — заполняется по мере подключения провайдеров
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  DEEPGRAM_API_KEY: ""
  ELEVENLABS_API_KEY: ""
  SMTP_HOST: ""
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM: ""
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_FROM_NUMBER: ""
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  VAPID_PUBLIC_KEY: ""
  VAPID_PRIVATE_KEY: ""
  VAPID_SUBJECT: ""
