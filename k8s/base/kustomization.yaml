apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: emdr42

resources:
  - namespace.yaml
  - configmap.yaml
  # - secrets.example.yaml — НЕ включать в прод! Создавать через kubectl
  - postgres.yaml
  - redis.yaml
  - api.yaml
  - orchestrator.yaml
