# LiveKit WebRTC server (#E8).
# Для production обычно используется LiveKit Cloud (managed), но self-host
# конфиг описан здесь для self-contained развёртывания. TURN-сервер встроен.
#
# Требует:
#  - emdr42-secrets: LIVEKIT_API_KEY, LIVEKIT_API_SECRET
#  - public IP для UDP-портов 3478, 5349 (TURN). В облаке нужно явно
#    разрешить эти порты в Security Group / Network Policy.
apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-config
data:
  config.yaml: |
    port: 7880
    rtc:
      tcp_port: 7881
      port_range_start: 50000
      port_range_end: 50100
      use_external_ip: true
    turn:
      enabled: true
      domain: turn.emdr42.com
      tls_port: 5349
      udp_port: 3478
    keys:
      $LIVEKIT_API_KEY: $LIVEKIT_API_SECRET
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: livekit
          image: livekit/livekit-server:v1.8.0
          args: ["--config", "/etc/livekit/config.yaml"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: emdr42-secrets
          ports:
            - { containerPort: 7880, name: ws }
            - { containerPort: 7881, name: rtc-tcp }
            - { containerPort: 3478, name: turn-udp, protocol: UDP }
            - { containerPort: 5349, name: turn-tls }
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: 1000m, memory: 1Gi }
          volumeMounts:
            - name: config
              mountPath: /etc/livekit
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet: { path: /, port: 7880 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /, port: 7880 }
            initialDelaySeconds: 5
      volumes:
        - name: config
          configMap: { name: livekit-config }
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: livekit
spec:
  type: LoadBalancer
  selector:
    app: livekit
  ports:
    - { port: 7880, targetPort: 7880, name: ws }
    - { port: 3478, targetPort: 3478, name: turn-udp, protocol: UDP }
    - { port: 5349, targetPort: 5349, name: turn-tls }
