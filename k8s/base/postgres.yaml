# Для MVP — StatefulSet с single replica.
# Для production рекомендую managed DB (AWS RDS, Cloud SQL) вместо self-hosted.

apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: emdr42
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: emdr42
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: emdr42
            - name: POSTGRES_DB
              value: emdr42
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: emdr42-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "emdr42"]
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "emdr42"]
            periodSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
