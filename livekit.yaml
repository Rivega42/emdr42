# LiveKit Server Configuration
# https://docs.livekit.io/realtime/self-hosting/deployment/

port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 50100
  tcp_port: 7881
  use_third-party_ip: true
  # Для production раскомментировать и указать внешний IP:
  # node_ip: YOUR_SERVER_IP

keys:
  # API Key : Secret (сгенерировать через: openssl rand -base64 32)
  # В production использовать переменные окружения LIVEKIT_KEYS
  devkey: secret

logging:
  level: info
  # json: true  # для production

# Turn server для NAT traversal
turn:
  enabled: true
  udp_port: 3478
  tls_port: 5349

# Webhook для событий (опционально)
# webhook:
#   urls:
#     - http://api:8000/api/livekit/webhook
#   api_key: devkey

# Redis для multi-node (опционально)
# redis:
#   address: redis:6379

# Room settings
room:
  empty_timeout: 300  # 5 минут до закрытия пустой комнаты
  max_participants: 10

# Recording (нужен Egress service)
# egress:
#   api_key: devkey
#   api_secret: secret
